<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>MINI GAME · 控制台</title>
<link rel="manifest" href="/manifest-admin.webmanifest" />
<meta name="theme-color" content="#0a0c12" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="MG 控制台" />
<link rel="apple-touch-icon" href="/icon-admin.svg" />
<link rel="icon" href="/icon-admin.svg" />
<style>
  :root{
    --bg:#0a0c12; --bg2:#0e1118; --panel:#12161f; --panel2:#161b26;
    --border:#222937; --border2:#2c3545;
    --text:#e7ebf2; --muted:#8b95a7; --faint:#5d6677;
    --accent:#5b7cfa; --accent2:#4f6ef0; --accentSoft:rgba(91,124,250,.12);
    --pos:#34d399; --neg:#f87171; --warn:#fbbf24;
    --radius:14px; --shadow:0 10px 30px rgba(0,0,0,.35);
    font-synthesis:none;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 600px at 80% -10%, #131a2b 0%, var(--bg) 55%) fixed;
    color:var(--text);
    font-family:'Inter','Segoe UI',system-ui,-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
    font-size:14px; -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  a{color:var(--accent);text-decoration:none}
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:#222a38;border-radius:6px;border:2px solid var(--bg)}

  /* ---------- Login ---------- */
  .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login{
    width:380px;max-width:100%;background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--border);border-radius:18px;padding:34px 30px;box-shadow:var(--shadow)}
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:6px}
  .brand .logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),#7c5cfa);font-size:20px;box-shadow:0 6px 16px var(--accentSoft)}
  .brand b{font-size:17px;letter-spacing:.3px}
  .brand small{display:block;color:var(--muted);font-size:11.5px;font-weight:500;letter-spacing:2px;margin-top:2px}
  .login h2{font-size:15px;font-weight:600;margin:22px 0 16px;color:var(--text)}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:7px;font-weight:500}
  .input{width:100%;background:var(--bg2);border:1px solid var(--border2);color:var(--text);
    padding:11px 13px;border-radius:10px;font-size:14px;transition:border-color .15s,box-shadow .15s}
  .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accentSoft)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;
    padding:11px 16px;font-size:13.5px;font-weight:600;color:#fff;background:var(--accent);transition:filter .15s,transform .05s}
  .btn:hover{filter:brightness(1.08)} .btn:active{transform:translateY(1px)}
  .btn.full{width:100%;padding:12px}
  .btn.ghost{background:transparent;border:1px solid var(--border2);color:var(--text)}
  .btn.ghost:hover{border-color:var(--accent);color:#fff;filter:none}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
  .btn.pos{background:var(--pos);color:#06281c} .btn.neg{background:var(--neg);color:#3a0d0d}
  .btn.warn{background:var(--warn);color:#3a2c05}
  .err{color:var(--neg);font-size:12.5px;margin-top:10px;min-height:16px}

  /* ---------- App shell ---------- */
  .app{display:none;min-height:100vh}
  .app.on{display:grid;grid-template-columns:228px 1fr}
  .side{background:var(--bg2);border-right:1px solid var(--border);padding:20px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .side .brand{padding:4px 8px 18px}
  .nav{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:10px;color:var(--muted);
    font-weight:500;font-size:13.5px;transition:background .15s,color .15s}
  .nav .ic{width:18px;text-align:center;font-size:15px}
  .nav:hover{background:var(--panel);color:var(--text)}
  .nav.active{background:var(--accentSoft);color:#fff}
  .nav.active .ic{filter:drop-shadow(0 0 6px var(--accent))}
  .navbadge{display:inline-block;min-width:18px;text-align:center;background:var(--neg);color:#fff;font-size:11px;font-weight:700;border-radius:9px;padding:1px 6px;line-height:1.4}
  .chatitem:hover{background:var(--panel)!important}
  .side .spacer{flex:1}
  .side .who{padding:10px 12px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;margin-top:8px}
  .side .who b{color:var(--text);display:block;font-size:13px;margin-bottom:2px}

  .main{padding:26px 30px;min-width:0}
  .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:16px;flex-wrap:wrap}
  .head h1{font-size:20px;font-weight:650;margin:0;letter-spacing:.2px}
  .head .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
  .toolbar{display:flex;gap:9px;align-items:center;flex-wrap:wrap}

  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:16px;margin-bottom:8px}
  .card{background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--border);
    border-radius:var(--radius);padding:18px 20px}
  .card .k{color:var(--muted);font-size:12.5px;font-weight:500;display:flex;align-items:center;gap:8px}
  .card .v{font-size:27px;font-weight:700;margin-top:10px;letter-spacing:.5px}
  .card .dot{width:9px;height:9px;border-radius:50%}

  .panel{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .panel + .panel{margin-top:18px}
  .panel .ph{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border);gap:12px;flex-wrap:wrap}
  .panel .ph h3{margin:0;font-size:14px;font-weight:600}
  .filters{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .filters .input{padding:8px 11px;border-radius:8px;font-size:13px}
  .filters .input.search{width:260px;max-width:48vw}
  .filters .input.date{width:148px}

  table{width:100%;border-collapse:collapse;font-size:13px}
  th{ text-align:left;color:var(--muted);font-weight:500;font-size:11.5px;letter-spacing:.4px;text-transform:uppercase;
    padding:11px 16px;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0}
  td{padding:11px 16px;border-bottom:1px solid var(--border)}
  tr:last-child td{border-bottom:none}
  tbody tr:hover{background:var(--panel2)}
  .tbl-wrap{max-height:60vh;overflow:auto}
  .mono{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .pos{color:var(--pos)} .neg{color:var(--neg)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:11.5px;font-weight:600}
  .pill.active{background:rgba(52,211,153,.12);color:var(--pos)}
  .pill.banned{background:rgba(248,113,113,.13);color:var(--neg)}
  .pill.type{background:var(--panel2);color:var(--muted);border:1px solid var(--border2)}
  .rowact{display:flex;gap:6px;flex-wrap:wrap}
  .empty{padding:40px;text-align:center;color:var(--faint)}

  .formgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;padding:20px 18px}
  .formgrid .field{margin:0}
  .settings-foot{padding:0 18px 18px;display:flex;gap:10px;align-items:center}

  /* toast + modal */
  #toast{position:fixed;right:22px;bottom:22px;display:flex;flex-direction:column;gap:10px;z-index:60}
  .toast{background:var(--panel2);border:1px solid var(--border2);border-left:3px solid var(--accent);
    padding:12px 16px;border-radius:10px;box-shadow:var(--shadow);font-size:13px;min-width:200px;animation:slidein .2s ease}
  .toast.ok{border-left-color:var(--pos)} .toast.bad{border-left-color:var(--neg)}
  @keyframes slidein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .modal-bg{position:fixed;inset:0;background:rgba(4,6,10,.66);display:none;align-items:center;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  .modal-bg.on{display:flex}
  .modal{width:360px;max-width:92vw;background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--border2);border-radius:16px;padding:22px;box-shadow:var(--shadow)}
  .modal h3{margin:0 0 4px;font-size:15px}
  .modal p{color:var(--muted);font-size:12.5px;margin:0 0 16px}
  .modal .acts{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
  /* ---------- 手机版底部标签栏 ---------- */
  .botnav{display:none}
  .hdr-logout{display:none}
  @media(max-width:760px){
    .app.on{grid-template-columns:1fr}
    .side{display:none!important}
    .menu-btn{display:none!important}
    .main{padding:calc(14px + env(safe-area-inset-top)) 13px calc(70px + env(safe-area-inset-bottom)) 13px}
    .head{margin-bottom:16px}
    .head h1{font-size:18px}
    .cards{grid-template-columns:1fr 1fr;gap:12px}
    .filters .input.search{width:100%;max-width:none}
    .hdr-logout{display:inline-flex}
    .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:50;
      background:rgba(14,17,24,.96);backdrop-filter:blur(8px);border-top:1px solid var(--border);
      padding-bottom:env(safe-area-inset-bottom)}
    .botnav a{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 1px;
      color:var(--muted);font-size:10px;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent}
    .botnav a b{font-size:19px;line-height:1;font-weight:400}
    .botnav a.active{color:var(--accent)}
    .botnav a i{position:absolute;top:5px;left:calc(50% + 9px);width:8px;height:8px;border-radius:50%;background:var(--neg);display:none}
    .botnav a i.on{display:block}
    /* 客服聊天：手机改单栏，列表/会话切换 */
    #chatWrap{grid-template-columns:1fr!important;height:calc(100vh - 190px)!important}
    #chatWrap.showthread #chatListPanel{display:none}
    #chatWrap:not(.showthread) #chatThreadPanel{display:none}
    .chat-back{display:inline-flex!important}
  }
  .chat-back{display:none}
  .menu-btn{display:none}
</style>
</head>
<body>

<!-- ============ LOGIN ============ -->
<div class="login-wrap" id="loginView">
  <form class="login" id="loginForm" autocomplete="off">
    <div class="brand">
      <div class="logo">🎮</div>
      <div><b>MINI GAME</b><small>ADMIN CONSOLE</small></div>
    </div>
    <h2>管理员登录</h2>
    <div class="field">
      <label>管理员账号</label>
      <input class="input" id="luser" placeholder="用户名" autocomplete="username" />
    </div>
    <div class="field">
      <label>密码</label>
      <input class="input" id="lpass" type="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn full" type="submit" id="lbtn">登录</button>
    <div class="err" id="lerr"></div>
  </form>
</div>

<!-- ============ APP ============ -->
<div class="app" id="appView">
  <aside class="side" id="side">
    <div class="brand">
      <div class="logo">🎮</div>
      <div><b>MINI GAME</b><small>ADMIN CONSOLE</small></div>
    </div>
    <a class="nav active" data-view="overview"><span class="ic">📊</span> 总览</a>
    <a class="nav" data-view="users"><span class="ic">👥</span> 玩家管理</a>
    <a class="nav" data-view="tx"><span class="ic">🧾</span> 交易流水</a>
    <a class="nav" data-view="chat"><span class="ic">💬</span> 客服聊天 <span id="navUnread" class="navbadge" style="display:none"></span></a>
    <a class="nav" data-view="settings"><span class="ic">🎛️</span> 游戏设置</a>
    <a class="nav" data-view="admins"><span class="ic">🔐</span> 管理员</a>
    <div class="spacer"></div>
    <div class="who"><b id="whoName">—</b>已登录</div>
    <a class="nav" id="logoutBtn"><span class="ic">🚪</span> 退出登录</a>
  </aside>

  <main class="main">
    <div class="head">
      <div style="display:flex;align-items:center;gap:10px">
        <button class="btn ghost sm menu-btn" id="menuBtn">☰</button>
        <div>
          <h1 id="pageTitle">总览</h1>
          <div class="sub" id="pageSub">线上数据 · 实时</div>
        </div>
        <button class="btn ghost sm hdr-logout" id="hdrLogout" style="margin-left:auto">🚪 退出</button>
      </div>
      <div class="toolbar" id="toolbar"></div>
    </div>
    <div id="content"></div>
  </main>

  <nav class="botnav" id="botnav">
    <a data-view="overview"><b>📊</b><span>总览</span></a>
    <a data-view="users"><b>👥</b><span>玩家</span></a>
    <a data-view="chat"><b>💬</b><span>客服</span><i id="botUnread"></i></a>
    <a data-view="tx"><b>🧾</b><span>流水</span></a>
    <a data-view="settings"><b>🎛️</b><span>设置</span></a>
    <a data-view="admins"><b>🔐</b><span>管理</span></a>
  </nav>
</div>

<div id="toast"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>

<script>
const API = location.origin;
let TOKEN = localStorage.getItem("mg_admin_token") || "";
let WHO = localStorage.getItem("mg_admin_user") || "";
let cachePlayers = [], cacheTx = [];

/* ---------- helpers ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};
const fmt = n => (n==null?"—":Number(n).toLocaleString("en-US"));
const esc = s => String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]));
// 服务器存的是 UTC（'YYYY-MM-DD HH:MM:SS'）；显示时转成本设备所在时区的本地时间
function fmtTime(s){
  if(!s) return "";
  const d = new Date(String(s).replace(" ","T")+"Z");
  if(isNaN(d.getTime())) return esc(s);
  const p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

function toast(msg, kind){
  const t = el("div","toast "+(kind||""),esc(msg));
  $("#toast").appendChild(t);
  setTimeout(()=>{t.style.opacity="0";t.style.transition="opacity .3s";setTimeout(()=>t.remove(),300);},2600);
}

async function api(path, body){
  const r = await fetch(API+"/api/admin/"+path,{
    method:"POST",
    headers:{"Content-Type":"application/json", ...(TOKEN?{"Authorization":"Bearer "+TOKEN}:{})},
    body:JSON.stringify(body||{})
  });
  if(r.status===401 && path!=="login"){ logout(); throw new Error("登录已过期，请重新登录"); }
  let data={}; try{ data = await r.json(); }catch(e){}
  if(!r.ok || data.ok===false){ throw new Error(data.message || data.error || ("HTTP "+r.status)); }
  return data;
}

/* ---------- auth ---------- */
$("#loginForm").addEventListener("submit", async e=>{
  e.preventDefault();
  $("#lerr").textContent=""; const b=$("#lbtn"); b.disabled=true; b.textContent="登录中…";
  try{
    const d = await api("login",{username:$("#luser").value.trim(), password:$("#lpass").value});
    TOKEN=d.token; WHO=d.username;
    localStorage.setItem("mg_admin_token",TOKEN); localStorage.setItem("mg_admin_user",WHO);
    enterApp();
  }catch(err){ $("#lerr").textContent = err.message==="invalid"?"账号或密码错误":err.message; }
  b.disabled=false; b.textContent="登录";
});
function logout(){
  TOKEN=""; WHO=""; localStorage.removeItem("mg_admin_token"); localStorage.removeItem("mg_admin_user");
  $("#appView").classList.remove("on"); $("#loginView").style.display="flex";
}
$("#logoutBtn").addEventListener("click",logout);
$("#hdrLogout").addEventListener("click",logout);

let unreadTimer=null;
function enterApp(){
  $("#loginView").style.display="none";
  $("#appView").classList.add("on");
  $("#whoName").textContent = WHO || "admin";
  go("overview");
  // 全局未读提醒：任何页面都会在菜单上显示红点
  pollUnread();
  if(unreadTimer) clearInterval(unreadTimer);
  unreadTimer=setInterval(pollUnread, 12000);
}
async function pollUnread(){
  try{ const d=await api("chat/unread"); updateNavUnread(parseInt(d.unread||0,10)); }catch(e){}
}

/* ---------- nav ---------- */
const TITLES = {overview:["总览","线上数据 · 实时"],users:["玩家管理","查看 / 调整线上真实玩家"],
  tx:["交易流水","所有下注与积分变动记录"],chat:["客服聊天","玩家消息 · 实时回复"],
  settings:["游戏设置","下注额 + 奖品表，改动实时生效"],admins:["管理员","账号增删（各自独立登录）"]};
document.querySelectorAll(".nav[data-view], .botnav a[data-view]").forEach(n=>n.addEventListener("click",()=>go(n.dataset.view)));
$("#menuBtn").addEventListener("click",()=>$("#side").classList.toggle("show"));

function go(view){
  clearChatTimer();
  document.querySelectorAll(".nav[data-view], .botnav a[data-view]").forEach(n=>n.classList.toggle("active",n.dataset.view===view));
  $("#pageTitle").textContent=TITLES[view][0]; $("#pageSub").textContent=TITLES[view][1];
  $("#toolbar").innerHTML=""; $("#content").innerHTML='<div class="empty">加载中…</div>';
  $("#side").classList.remove("show");
  ({overview:viewOverview,users:viewUsers,tx:viewTx,chat:viewChat,settings:viewSettings,admins:viewAdmins}[view])();
}

/* ---------- Overview ---------- */
async function viewOverview(){
  try{
    const d = await api("overview");
    const cards = [
      ["玩家总数","👥",fmt(d.users),"var(--accent)"],
      ["系统总积分","💰",fmt(d.total_points),"var(--pos)"],
      ["今日抽奖次数","🎰",fmt(d.today_spins),"var(--warn)"],
      ["封禁玩家","🚫",fmt(d.banned),"var(--neg)"]
    ];
    const wrap = el("div","cards");
    cards.forEach(([k,ic,v,col])=>{
      const c = el("div","card");
      c.innerHTML = `<div class="k"><span class="dot" style="background:${col}"></span>${ic} ${k}</div><div class="v">${v}</div>`;
      wrap.appendChild(c);
    });
    $("#content").innerHTML=""; $("#content").appendChild(wrap);
  }catch(e){ $("#content").innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}

/* ---------- Users ---------- */
async function viewUsers(){
  $("#toolbar").innerHTML="";
  const exp = el("button","btn ghost sm","📥 导出 CSV"); exp.onclick=()=>exportCsv("players",cachePlayers);
  $("#toolbar").appendChild(exp);

  const panel = el("div","panel");
  panel.innerHTML = `<div class="ph"><h3>玩家列表</h3>
    <div class="filters"><input class="input search" id="uq" placeholder="🔎 搜索 昵称 / Telegram ID"></div></div>
    <div class="tbl-wrap"><table><thead><tr>
      <th>Telegram ID</th><th>昵称</th><th>积分</th><th>状态</th><th>操作</th>
    </tr></thead><tbody id="ubody"><tr><td colspan="5" class="empty">加载中…</td></tr></tbody></table></div>`;
  $("#content").innerHTML=""; $("#content").appendChild(panel);

  const load = async q=>{
    try{ const d = await api("players",{q}); cachePlayers=d.players; renderUsers(d.players); }
    catch(e){ $("#ubody").innerHTML=`<tr><td colspan="5" class="empty">${esc(e.message)}</td></tr>`; }
  };
  let tmr; $("#uq").addEventListener("input",e=>{clearTimeout(tmr);tmr=setTimeout(()=>load(e.target.value.trim()),250);});
  load("");
}
function renderUsers(rows){
  const b=$("#ubody"); b.innerHTML="";
  if(!rows.length){ b.innerHTML='<tr><td colspan="5" class="empty">暂无玩家</td></tr>'; return; }
  rows.forEach(p=>{
    const tr=el("tr");
    tr.innerHTML = `<td class="mono">${p.tg_id}</td><td>${esc(p.username)||"<span style='color:var(--faint)'>—</span>"}</td>
      <td class="mono">${fmt(p.balance)}</td>
      <td><span class="pill ${p.status==='banned'?'banned':'active'}">${p.status==='banned'?'已封禁':'正常'}</span></td>`;
    const act=el("td"); const wrap=el("div","rowact");
    const bg=el("button","btn pos sm","➕分"), bd=el("button","btn neg sm","➖分"),
          bb=el("button","btn "+(p.status==='banned'?"warn":"ghost")+" sm",p.status==='banned'?"解封":"封禁"),
          bh=el("button","btn ghost sm","明细"),
          bx=el("button","btn neg sm","🗑");
    bg.onclick=()=>adjustModal(p,1); bd.onclick=()=>adjustModal(p,-1);
    bb.onclick=()=>banPlayer(p);
    bh.onclick=()=>playerHistory(p);

    </div>`;
  Object.keys(GAME_LABELS).forEach(k=>renderPrizeRows(k));
  document.querySelectorAll(".addPrize").forEach(b=>b.onclick=()=>{ setData.games[b.dataset.g].prizes.push({type:"fixed",value:0,weight:10,label:"新奖品"}); renderPrizeRows(b.dataset.g); });
  document.querySelectorAll(".g-bet").forEach(inp=>inp.oninput=()=>{ setData.games[inp.dataset.g].bet=inp.value; updateEV(inp.dataset.g); });

function renderPrizeRows(k){
  const body=document.querySelector('.prizeBody[data-g="'+k+'"]'); if(!body) return;
  const prizes=setData.games[k].prizes;
  if(!prizes.length){ body.innerHTML='<tr><td colspan="5" class="empty" style="padding:18px">还没有奖品，点下方"添加奖品"</td></tr>'; updateEV(k); return; }
  body.innerHTML="";
  prizes.forEach((p,i)=>{
    const tr=document.createElement("tr");
    const valCell = p.type==="range"
      ? `<input class="input pr" data-g="${k}" data-i="${i}" data-f="min" type="number" min="0" value="${p.min!=null?p.min:0}" style="width:72px;padding:6px 8px"> –
         <input class="input pr" data-g="${k}" data-i="${i}" data-f="max" type="number" min="0" value="${p.max!=null?p.max:0}" style="width:72px;padding:6px 8px">`
      : `<input class="input pr" data-g="${k}" data-i="${i}" data-f="value" type="number" min="0" value="${p.value!=null?p.value:0}" style="width:110px;padding:6px 8px">`;
    tr.innerHTML=`
      <td><input class="input pr" data-g="${k}" data-i="${i}" data-f="label" value="${esc(p.label||'')}" style="padding:6px 8px"></td>
      <td><select class="input pr" data-g="${k}" data-i="${i}" data-f="type" style="padding:6px 8px">
        <option value="fixed" ${p.type!=="range"?"selected":""}>固定分</option>
        <option value="range" ${p.type==="range"?"selected":""}>区间随机</option></select></td>
      <td>${valCell}</td>
      <td><input class="input pr" data-g="${k}" data-i="${i}" data-f="weight" type="number" min="0" value="${p.weight!=null?p.weight:0}" style="width:78px;padding:6px 8px"></td>
      <td><button class="btn neg sm delPrize" data-g="${k}" data-i="${i}">删</button></td>`;
    body.appendChild(tr);
  });
  body.querySelectorAll(".pr").forEach(inp=>{
    const f=inp.dataset.f, i=+inp.dataset.i;
    inp.oninput=inp.onchange=()=>{
      const p=setData.games[k].prizes[i];
      if(f==="type"){ p.type=inp.value; renderPrizeRows(k); return; }
      if(f==="label"){ p.label=inp.value; } else { p[f]=inp.value; }
      updateEV(k);
    };
  });
  body.querySelectorAll(".delPrize").forEach(b=>b.onclick=()=>{ setData.games[k].prizes.splice(+b.dataset.i,1); renderPrizeRows(k); });
  updateEV(k);
}
function updateEV(k){
  const g=setData.games[k]; const bet=parseInt(g.bet,10)||0;
  let tw=0, ev=0;
  g.prizes.forEach(p=>{ tw+=parseInt(p.weight,10)||0; });
  if(tw>0) g.prizes.forEach(p=>{ const w=(parseInt(p.weight,10)||0)/tw;
    const val=p.type==="range" ? ((parseInt(p.min,10)||0)+(parseInt(p.max,10)||0))/2 : (parseInt(p.value,10)||0);
    ev += w*val; });
  const span=document.querySelector('.setEV[data-g="'+k+'"]');
  if(span){ span.textContent = tw>0 ? `EV ${ev.toFixed(1)} 分 / 下注 ${bet} · 庄家净 ${(bet-ev).toFixed(1)}` : "请添加奖品（权重>0）";
    span.style.color = (tw>0 && ev<=bet) ? "var(--pos)" : "var(--warn)"; }
}
async function saveSettings(){
  const body={ start_balance:$("#s_start_balance").value, games:{} };
  Object.keys(GAME_LABELS).forEach(k=>{ const g=setData.games[k]; body.games[k]={bet:g.bet,enabled:g.enabled,prizes:g.prizes}; });
  try{ const d=await api("settings/save",body); setData=d.settings;
    Object.keys(GAME_LABELS).forEach(k=>{ if(!setData.games[k]) setData.games[k]={bet:50,enabled:true,prizes:[]}; });
    toast("全部设置已保存生效","ok"); renderSettings(); }
  catch(e){ toast(e.message,"bad"); }
}

    box.querySelectorAll(".chatitem").forEach(it=>it.onclick=()=>openThread(it.dataset.tg,it.dataset.name));
    updateNavUnread(total);
  }catch(e){ const box=$("#chatList"); if(box) box.innerHTML=`<div class="empty">${esc(e.message)}</div>`; }
}
async function openThread(tgid,name){
  chatState.tgid=String(tgid); chatState.name=name;
  const w=$("#chatWrap"); if(w) w.classList.add("showthread");
  $("#chatTitle").textContent=`${name} · ID ${tgid}`;
  const acts=$("#chatActions");
  if(acts){ acts.innerHTML=`<button class="btn pos sm" id="chatCharge">➕ 加分/充值</button><button class="btn ghost sm" id="chatQR">💳 二维码</button>`;
    $("#chatCharge").onclick=()=>chargeModal(chatState.tgid,name);
    $("#chatQR").onclick=()=>sendQR(chatState.tgid); }
  $("#chatComposer").style.display="flex";
  $("#chatInput").onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); sendChat(); } };
  await loadThread(); loadChatList();
}
const mediaCache={};
function mediaHtml(mtype,url){
  if(mtype==='photo') return `<img src="${url}" style="max-width:220px;max-height:240px;border-radius:8px;display:block;margin-top:6px;cursor:zoom-in" onclick="window.open('${url}')">`;
  if(mtype==='video') return `<video src="${url}" controls style="max-width:240px;max-height:260px;border-radius:8px;display:block;margin-top:6px"></video>`;
  if(mtype==='voice') return `<audio src="${url}" controls style="margin-top:6px;max-width:220px;display:block"></audio>`;
  return `<a href="${url}" target="_blank" style="margin-top:6px;display:inline-block">📎 下载文件</a>`;
}
async function loadMedia(mid){
  if(mediaCache[mid]) return mediaCache[mid];
  try{
    const r=await fetch(API+"/api/admin/chat/media",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},body:JSON.stringify({media_id:mid})});
    if(!r.ok) return null;
    const url=URL.createObjectURL(await r.blob()); mediaCache[mid]=url; return url;
  }catch(e){ return null; }
}
function hydrateMedia(){
  document.querySelectorAll('#chatThread .mediaholder').forEach(h=>{
    if(h.dataset.loaded) return; h.dataset.loaded='1';
    const mid=h.dataset.mid, mtype=h.dataset.mtype;
    loadMedia(mid).then(url=>{ h.innerHTML = url ? mediaHtml(mtype,url) : '（媒体加载失败）'; });
  });
}
async function loadThread(){
  if(!chatState.tgid) return;
  try{
    const d=await api("chat/thread",{tg_id:chatState.tgid}); const box=$("#chatThread"); if(!box) return;
    if(!d.messages.length){ box.innerHTML='<div class="empty">还没有消息</div>'; return; }
    box.innerHTML=d.messages.map(m=>{
      const out=m.direction==='out';
      let inner=esc(m.text);
      if(m.media_type && m.media_id){
        const cached=mediaCache[m.media_id];
        inner += cached ? mediaHtml(m.media_type,cached)
          : `<div class="mediaholder" data-mid="${esc(m.media_id)}" data-mtype="${esc(m.media_type)}" style="margin-top:6px;color:var(--faint);font-size:12px">加载中…</div>`;
      }
      return `<div style="align-self:${out?'flex-end':'flex-start'};max-width:75%">
        <div style="background:${out?'var(--accent)':'var(--panel2)'};color:${out?'#fff':'var(--text)'};border:1px solid ${out?'transparent':'var(--border2)'};padding:8px 12px;border-radius:12px;font-size:13px;white-space:pre-wrap;word-break:break-word">${inner}</div>
        <div style="color:var(--faint);font-size:10.5px;margin-top:3px;text-align:${out?'right':'left'}">${out?'我':'玩家'} · ${fmtTime(m.created_at)} <span class="msgdel" data-id="${m.id}" style="cursor:pointer;color:var(--neg);margin-left:6px">撤回</span></div>
      </div>`;
    }).join("");
    hydrateMedia();
    document.querySelectorAll('#chatThread .msgdel').forEach(s=>s.onclick=()=>recallMsg(+s.dataset.id));
    box.scrollTop=box.scrollHeight;
  }catch(e){}
}
function recallMsg(id){
  modal("撤回 / 删除消息","将<b>同时</b>从后台和玩家的 Telegram 里删除这条消息。<br>（超过 48 小时玩家端可能撤不回，但后台仍会删）","",
    async()=>{ try{ const d=await api("chat/delete",{id});
      toast(d.recalled?"已双向撤回 ✅":"已删除（玩家端未撤回，可能超时）","ok");
      closeModal(); loadThread(); loadChatList(); }catch(e){ toast(e.message,"bad"); } });
}
async function uploadMedia(e){
  const f=e.target.files&&e.target.files[0]; e.target.value="";
  if(!f||!chatState.tgid) return;
  let kind="document";
  if(f.type.startsWith("image/")) kind="photo";
  else if(f.type.startsWith("video/")) kind="video";
  else if(f.type.startsWith("audio/")) kind="voice";
  const fd=new FormData(); fd.append("tg_id",chatState.tgid); fd.append("kind",kind); fd.append("file",f);
  const cap=($("#chatInput")&&$("#chatInput").value||"").trim(); if(cap) fd.append("caption",cap);
  toast("上传中…");
  try{
    const r=await fetch(API+"/api/admin/chat/upload",{method:"POST",headers:{"Authorization":"Bearer "+TOKEN},body:fd});
    const d=await r.json().catch(()=>({}));
    if(!r.ok||d.ok===false) throw new Error(d.message||d.error||"上传失败");
    if(cap && $("#chatInput")) $("#chatInput").value="";
    toast("已发送","ok"); loadThread();
  }catch(err){ toast(err.message||"上传失败","bad"); }
}
function parseButtons(raw){ raw=(raw||"").trim(); return raw?raw.split(/[,，]/).map(s=>s.trim()).filter(Boolean).slice(0,8):undefined; }
async function sendChat(){
  const inp=$("#chatInput"); if(!inp) return; const text=inp.value.trim();
  if(!text||!chatState.tgid) return;
  const buttons=parseButtons($("#chatButtons")&&$("#chatButtons").value);
  const remove_keyboard=$("#chatRmKb")&&$("#chatRmKb").checked;
  inp.value="";
  try{ await api("chat/send",{tg_id:chatState.tgid,text,buttons,remove_keyboard}); await loadThread(); }
  catch(e){ toast(e.message,"bad"); inp.value=text; }
}
function chargeModal(tgid,name){
  modal("给玩家加分 / 充值",`玩家 <b>${esc(name)}</b> · ID ${tgid}`,
    `<div class="field"><label>加分数量</label><input class="input" id="chgAmt" type="number" min="1" value="100"></div>
     <div class="field"><label style="cursor:pointer"><input type="checkbox" id="chgNotify" checked style="vertical-align:-2px"> 通知玩家（聊天里发一条到账提示）</label></div>`,
    async()=>{
      const amt=Math.abs(parseInt($("#chgAmt").value,10)||0); if(!amt) return toast("请输入数量","bad");
      const notify=$("#chgNotify").checked;
      try{ const d=await api("adjust",{tg_id:tgid,amount:amt,note:"客服充值"});
        if(notify) await api("chat/send",{tg_id:tgid,text:`💰 已为您充值 ${amt} 分，当前余额 ${d.balance} 分，祝您游戏愉快！`});
        toast("已加分 "+amt,"ok"); closeModal(); loadThread();
      }catch(e){ toast(e.message,"bad"); }
    });
}
async function sendQR(tgid){
  try{ await api("chat/photo",{tg_id:tgid}); toast("已发送充值二维码","ok"); loadThread(); }
  catch(e){ toast(e.message,"bad"); }
}
async function broadcastModal(){
  let scheduled=[];
  try{ scheduled=(await api("broadcast/scheduled")).list||[]; }catch(e){}
  $("#modalBox").style.width="480px";
  $("#modalBox").innerHTML=`
    <h3>📢 群发广播</h3>
    <p>发给所有未封禁玩家。可附带玩家快捷按钮，或定时发送（按你设备的本地时间）。</p>
    <div class="field"><label>消息内容</label><textarea class="input" id="bcText" rows="3" style="resize:vertical;width:100%"></textarea></div>
    <div class="field"><label>快捷按钮（可选，逗号分隔）</label><input class="input" id="bcBtns" placeholder="如 立即游戏,联系客服"></div>
    <div class="field"><label>定时发送（可选，留空＝立即）</label><input class="input" id="bcWhen" type="datetime-local"></div>
    <div id="bcProgress" style="font-size:12.5px;color:var(--muted);min-height:16px;margin:4px 0"></div>
    <div class="acts"><button class="btn ghost" id="bcCancel">关闭</button><button class="btn" id="bcGo">发送</button></div>
    ${scheduled.length?`<div style="margin-top:14px;border-top:1px solid var(--border);padding-top:10px">
      <div style="color:var(--muted);font-size:12px;margin-bottom:6px">已排期</div>
      ${scheduled.map(s=>`<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:12px;padding:3px 0">
        <span style="color:${s.sent?'var(--faint)':'var(--text)'}">${fmtTime(s.send_at)} · ${esc((s.text||'').slice(0,22))}${s.sent?'（已发）':''}</span>
        ${s.sent?'':`<button class="btn neg sm bcCancelSched" data-id="${s.id}">取消</button>`}</div>`).join("")}
    </div>`:''}`;
  $("#modalBg").classList.add("on");
  $("#bcCancel").onclick=closeModal;
  document.querySelectorAll(".bcCancelSched").forEach(b=>b.onclick=async()=>{ try{ await api("broadcast/cancel",{id:+b.dataset.id}); toast("已取消","ok"); broadcastModal(); }catch(e){ toast(e.message,"bad"); } });
  $("#bcGo").onclick=async()=>{
    const text=($("#bcText").value||"").trim(); if(!text) return toast("请输入内容","bad");
    const buttons=parseButtons($("#bcBtns").value);
    const when=$("#bcWhen").value;
    if(when){
      const dt=new Date(when); if(isNaN(dt.getTime())) return toast("时间格式不对","bad");
      const send_at=dt.toISOString().slice(0,16).replace("T"," ");
      try{ await api("broadcast/schedule",{text,buttons,send_at}); toast("已排期定时发送","ok"); broadcastModal(); }catch(e){ toast(e.message,"bad"); }
      return;
    }
    const go=$("#bcGo"); go.disabled=true;
    let offset=0,sent=0,total=0;
    try{
      while(true){
        const d=await api("broadcast",{text,buttons,offset,limit:40});
        sent+=d.sent; total=d.total; offset=d.nextOffset;
        $("#bcProgress").textContent=`已发送 ${sent}/${total}…`;
        if(d.done) break;
      }
      toast(`群发完成，共 ${sent} 人`,"ok"); closeModal();
    }catch(e){ toast(e.message,"bad"); go.disabled=false; }
  };
}
let cfgRules=[];
async function configModal(){
  let cfg={welcome_text:"",autoreply:[],qr_url:""};
  try{ cfg=(await api("config/get")).config; }catch(e){}
  cfgRules=(cfg.autoreply||[]).map(r=>({kw:r.kw,reply:r.reply}));
  $("#modalBox").style.width="540px";
  $("#modalBox").innerHTML=`
    <h3>⚙️ 自动回复 / 配置</h3>
    <div class="field"><label>欢迎语（玩家 /start 时发送；留空用默认）</label>
      <textarea class="input" id="cfgWelcome" rows="3" style="resize:vertical;width:100%">${esc(cfg.welcome_text||"")}</textarea></div>
    <div class="field"><label>充值二维码图片 URL（点聊天里"💳 二维码"发给玩家）</label>
      <input class="input" id="cfgQr" value="${esc(cfg.qr_url||"")}" placeholder="https://…（图片直链）"></div>
    <div class="field"><label>关键词自动回复（玩家消息含关键词即自动回）</label>
      <div id="cfgRules"></div>
      <button class="btn ghost sm" id="cfgAddRule" style="margin-top:6px">➕ 添加规则</button></div>
    <div class="acts"><button class="btn ghost" id="cfgCancel">关闭</button><button class="btn" id="cfgSave">保存</button></div>`;
  $("#modalBg").classList.add("on");
  renderCfgRules();
  $("#cfgAddRule").onclick=()=>{ cfgRules.push({kw:"",reply:""}); renderCfgRules(); };
  $("#cfgCancel").onclick=closeModal;
  $("#cfgSave").onclick=async()=>{
    try{ await api("config/save",{welcome_text:$("#cfgWelcome").value,qr_url:$("#cfgQr").value,autoreply:cfgRules});
      toast("配置已保存","ok"); closeModal(); }catch(e){ toast(e.message,"bad"); }
  };
}
function renderCfgRules(){
  const box=$("#cfgRules"); if(!box) return;
  box.innerHTML = cfgRules.length ? cfgRules.map((r,i)=>`
    <div style="display:flex;gap:6px;margin-bottom:6px;align-items:center">
      <input class="input cfgKw" data-i="${i}" placeholder="关键词" value="${esc(r.kw||'')}" style="width:120px;padding:6px 8px">
      <input class="input cfgRe" data-i="${i}" placeholder="自动回复内容" value="${esc(r.reply||'')}" style="flex:1;padding:6px 8px">
      <button class="btn neg sm cfgDel" data-i="${i}">删</button></div>`).join("")
    : '<div style="color:var(--faint);font-size:12px">暂无规则</div>';
  box.querySelectorAll(".cfgKw").forEach(inp=>inp.oninput=()=>cfgRules[+inp.dataset.i].kw=inp.value);
  box.querySelectorAll(".cfgRe").forEach(inp=>inp.oninput=()=>cfgRules[+inp.dataset.i].reply=inp.value);
  box.querySelectorAll(".cfgDel").forEach(b=>b.onclick=()=>{ cfgRules.splice(+b.dataset.i,1); renderCfgRules(); });
}

/* ---------- modal ---------- */
function modal(title,desc,fields,onok){
  $("#modalBox").style.width="";
  $("#modalBox").innerHTML=`<h3>${title}</h3><p>${desc}</p>${fields||""}
    <div class="acts"><button class="btn ghost" id="mCancel">${onok?"取消":"关闭"}</button>${onok?'<button class="btn" id="mOk">确定</button>':''}</div>`;
  $("#modalBg").classList.add("on");
  $("#mCancel").onclick=closeModal; if(onok) $("#mOk").onclick=onok;
}
function closeModal(){ $("#modalBg").classList.remove("on"); }
$("#modalBg").addEventListener("click",e=>{ if(e.target===$("#modalBg")) closeModal(); });

/* ---------- CSV ---------- */
function exportCsv(name,rows){
  if(!rows||!rows.length) return toast("没有可导出的数据","bad");
  const cols=Object.keys(rows[0]);
  const csv=[cols.join(",")].concat(rows.map(r=>cols.map(c=>{
    let v=r[c]==null?"":String(r[c]); if(/[",\n]/.test(v)) v='"'+v.replace(/"/g,'""')+'"'; return v;
  }).join(","))).join("\n");
  const blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8"});
  const a=el("a"); a.href=URL.createObjectURL(blob); a.download=name+"_"+Date.now()+".csv"; a.click();
}

/* ---------- PWA service worker ---------- */
if("serviceWorker" in navigator){ navigator.serviceWorker.register("/sw.js").catch(()=>{}); }

/* ---------- boot ---------- */
if(TOKEN){ enterApp(); } else { $("#loginView").style.display="flex"; }
